<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trucker Match - PRO MVP</title>
    <style>
        /* CSS Proměnné pro High-Tech vzhled */
        :root {
            --primary: #f39c12; 
            --dark: #0a0a0a;
            --glass-bg: rgba(15, 15, 15, 0.9);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: #000;
            background-image: url('https://images.unsplash.com/photo-1586191552066-f52fd92fb4c2?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-light);
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden; }
        .screen.active { display: flex; }

        /* --- NAČÍTACÍ ANIMACE (BUDÍK) VYCENTROVÁNÍ --- */
        #screen-loading { 
            display: none; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            background: #050505; 
            z-index: 100; 
        }
        #screen-loading.active { display: flex; }
        .gauge-container { position: relative; width: 160px; height: 80px; overflow: hidden; margin-bottom: 20px; }
        .gauge-background {
            width: 160px; height: 160px; border-radius: 50%;
            border: 12px solid #222; border-top-color: var(--primary); border-right-color: var(--primary);
            position: absolute; top: 0; left: 0; transform: rotate(-45deg);
        }
        .gauge-needle {
            width: 80px; height: 4px; background: #fff;
            position: absolute; bottom: 0; left: 0; transform-origin: right center;
            transform: rotate(0deg); animation: revUp 2s ease-in-out forwards;
        }
        @keyframes revUp {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(160deg); }
            70% { transform: rotate(140deg); }
            100% { transform: rotate(180deg); }
        }
        .loading-text { font-size: 20px; font-weight: bold; letter-spacing: 3px; color: var(--primary); }

        /* --- KOMPONENTY --- */
        .auth-container { padding: 30px; display: flex; flex-direction: column; justify-content: center; flex: 1; overflow-y: auto; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; margin-bottom: 12px; cursor: pointer; text-align: center; color: #fff; display: block; width: 100%; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-photo { background: #333; border: 1px dashed var(--text-muted); color: var(--text-light); }
        
        .input-dark { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.6); color: #fff; margin-bottom: 15px; font-size: 16px; }
        select.input-dark { appearance: none; }
        
        .header { padding: 20px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--glass-border); text-align: center; font-size: 20px; font-weight: bold; color: var(--primary); }
        .content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        
        /* Karty inzerátů */
        .card { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-img { width: 100%; height: 150px; background-color: #333; border-radius: 8px; margin-bottom: 15px; object-fit: cover; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-size: 18px; font-weight: bold; color: #fff; }
        .card-badge { background: var(--primary); color: #000; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .route-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .tag-grid { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
        .tag { background: #222; padding: 5px 10px; border-radius: 4px; font-size: 12px; color: var(--text-muted); border: 1px solid #333; }
        .tag.alert { border-color: var(--primary); color: var(--primary); }
        .card-price { color: var(--success); font-weight: bold; font-size: 20px; text-align: right; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        
        /* Formuláře v profilu */
        .form-section { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .form-section h3 { border-bottom: 1px solid var(--primary); padding-bottom: 8px; margin-bottom: 15px; font-size: 16px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
        input[type="range"] { width: 100%; accent-color: var(--primary); margin: 15px 0; }
        
        /* Profil info */
        .profile-header { display: flex; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; }
        .avatar { width: 65px; height: 65px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 26px; color: #000; font-weight: bold; margin-right: 15px; }
        .profile-name { font-size: 22px; font-weight: bold; }
        .karma { color: #f1c40f; font-weight: bold; font-size: 15px; margin: 4px 0; }

        /* Spodní navigace */
        .bottom-nav { display: flex; background: rgba(0,0,0,0.9); border-top: 1px solid var(--glass-border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .nav-item.active { color: var(--primary); box-shadow: inset 0 3px 0 var(--primary); background: rgba(243, 156, 18, 0.1); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">

    <div id="screen-loading" class="screen active">
        <div class="gauge-container">
            <div class="gauge-background"></div>
            <div class="gauge-needle"></div>
        </div>
        <div class="loading-text">TRUCKER MATCH</div>
    </div>

    <div id="screen-role" class="screen">
        <div class="auth-container">
            <h1 style="text-align: center; margin-bottom: 40px; color: var(--primary);">Vyberte profil</h1>
            <button class="btn btn-primary" style="padding: 25px; font-size: 18px;" onclick="startApp('driver')">🚛 JSEM ŘIDIČ</button>
            <button class="btn btn-outline" style="padding: 25px; font-size: 18px;" onclick="startApp('company')">🏢 JSEM FIRMA</button>
        </div>
    </div>

    <div id="screen-app" class="screen">
        <div class="header" id="app-header">Trucker Match</div>
        
        <div class="content">
            
            <div id="tab-driver-jobs" class="tab-content">
                <button class="btn btn-primary" onclick="loadJobs()">🔄 Obnovit nabídky v okolí</button>
                <div id="jobs-list" style="margin-top: 20px;"></div>
            </div>

            <div id="tab-driver-profile" class="tab-content">
                <div class="profile-header">
                    <div class="avatar">Ř</div>
                    <div>
                        <div class="profile-name">Jan Novák</div>
                        <div class="karma">⭐⭐⭐⭐⭐ 4.9 (Zkušený)</div>
                        <div style="color: var(--success); font-size: 13px;">✅ +420 777 123 456</div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Základní info & Dostupnost</h3>
                    <input type="text" class="input-dark" placeholder="Bydliště (např. Olomouc)">
                    
                    <label style="color: var(--text-muted);">Max. dojezd k autu: <span id="radius-val" style="color: #fff; font-weight: bold;">50 km</span></label>
                    <input type="range" min="0" max="200" value="50" oninput="document.getElementById('radius-val').innerText = this.value + ' km'">
                    
                    <input type="number" class="input-dark" placeholder="Moje minimální taxa (Kč / den)">
                    
                    <label class="check-item" style="background: rgba(243, 156, 18, 0.1); border: 1px solid var(--primary); margin-top: 10px;">
                        <input type="checkbox" checked> 🛡️ Mám vlastní pojištění na blbost
                    </label>
                </div>

                <div class="form-section">
                    <h3>Osobní preference</h3>
                    <select class="input-dark">
                        <option value="" disabled selected>Zkušenosti v oboru</option>
                        <option>Začátečník (do 1 roku)</option>
                        <option>Pokročilý (1 - 5 let)</option>
                        <option>Mazák (5+ let)</option>
                    </select>

                    <select class="input-dark">
                        <option value="" disabled selected>Ochota spát v kamionu</option>
                        <option>Nespím (Každý den doma)</option>
                        <option>Občas (1-2 dny v týdnu)</option>
                        <option>Pondělí - Pátek venku</option>
                        <option>Turnusy (Víkendy venku)</option>
                    </select>

                    <select class="input-dark">
                        <option>Jsem nekuřák</option>
                        <option>Jsem kuřák (kouřím v autě)</option>
                    </select>
                </div>

                <div class="form-section">
                    <h3>Profesní oprávnění</h3>
                    <div class="check-grid">
                        <label class="check-item"><input type="checkbox" checked> Skupina C</label>
                        <label class="check-item"><input type="checkbox" checked> Skupina C+E</label>
                        <label class="check-item"><input type="checkbox"> ADR (Základ)</label>
                        <label class="check-item"><input type="checkbox"> ADR (Cisterny)</label>
                        <label class="check-item"><input type="checkbox"> VZV (Ještěrka)</label>
                        <label class="check-item"><input type="checkbox"> Vazačský průkaz</label>
                        <label class="check-item"><input type="checkbox"> Průkaz jeřábníka</label>
                        <label class="check-item"><input type="checkbox"> Psychotesty platné</label>
                    </div>
                </div>

                <div class="form-section">
                    <h3>S čím umím jezdit (Návěsy)</h3>
                    <div class="check-grid">
                        <label class="check-item"><input type="checkbox" checked> Plachta / Mega</label>
                        <label class="check-item"><input type="checkbox"> Frigo (Chlaďák)</label>
                        <label class="check-item"><input type="checkbox"> Lesovůz</label>
                        <label class="check-item"><input type="checkbox"> Cisterna</label>
                        <label class="check-item"><input type="checkbox"> Silo</label>
                        <label class="check-item"><input type="checkbox"> Sklápěč</label>
                        <label class="check-item"><input type="checkbox"> Plato</label>
                        <label class="check-item"><input type="checkbox"> Nadměr</label>
                    </div>
                    <input type="text" class="input-dark" placeholder="+ Přidat vlastní (např. Walking floor)..." style="margin-top: 10px;">
                </div>

                <button class="btn btn-primary" onclick="alert('Profil uložen!')">Uložit profil</button>
            </div>

            <div id="tab-company-add" class="tab-content">
                <div class="form-section">
                    <h3>Vytvořit poptávku po řidiči</h3>
                    
                    <button class="btn btn-photo">📸 Nahrát fotku soupravy (Povinné)</button>

                    <div class="route-box" style="margin-top: 15px;">
                        <span style="color: var(--primary);">🅰️ Odkud:</span>
                        <input type="text" style="background: transparent; border: none; color: white; width: 100%; outline: none;" placeholder="Město / Depo">
                    </div>
                    <div class="route-box">
                        <span style="color: var(--danger);">🅱️ Kam:</span>
                        <input type="text" style="background: transparent; border: none; color: white; width: 100%; outline: none;" placeholder="Cílová destinace / Oblast">
                    </div>

                    <select class="input-dark" style="margin-top: 15px;">
                        <option>Typ návěsu: Plachta / Mega</option>
                        <option>Typ návěsu: Frigo</option>
                        <option>Typ návěsu: Lesovůz</option>
                        <option>Typ návěsu: Cisterna</option>
                        <option>Typ návěsu: Sklápěč</option>
                    </select>

                    <select class="input-dark">
                        <option>Režim spánku: Každý den doma</option>
                        <option>Režim spánku: Po - Pá v autě</option>
                        <option>Režim spánku: Víkendy venku</option>
                    </select>

                    <div class="check-grid">
                        <label class="check-item"><input type="radio" name="smoke" checked> Kuřák nevadí</label>
                        <label class="check-item"><input type="radio" name="smoke"> Přísně nekuřácké auto</label>
                    </div>

                    <select class="input-dark" style="margin-top: 15px;">
                        <option>Platba: Hotově po dojezdu na ruku</option>
                        <option>Platba: Faktura (Splatnost 14 dní)</option>
                        <option>Platba: Měsíční mzda</option>
                    </select>

                    <input type="number" class="input-dark" placeholder="Nabízená taxa (Kč / den nebo úkol)">
                    
                    <button class="btn btn-primary" onclick="alert('Inzerát vydán! Řidiči, kteří splňují podmínky, dostanou notifikaci.')">Zveřejnit inzerát</button>
                </div>
            </div>

            <div id="tab-company-profile" class="tab-content">
                <div class="profile-header">
                    <div class="avatar" style="background: #34495e; color: #fff;">F</div>
                    <div>
                        <div class="profile-name">Logistika s.r.o.</div>
                        <div class="karma">IČO: 12345678</div>
                    </div>
                </div>
                <div class="form-section">
                    <h3>Nastavení firmy</h3>
                    <input type="text" class="input-dark" value="Praha 9, Průmyslová 1" placeholder="Hlavní depo">
                    <input type="text" class="input-dark" value="Jan Dispečer" placeholder="Kontaktní osoba">
                    <input type="text" class="input-dark" value="+420 800 123 456" placeholder="Telefon pro řidiče">
                </div>
            </div>

        </div>

        <div class="bottom-nav" id="bottom-navigation"></div>
    </div>
</div>

<script>
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // Animace spuštění
    setTimeout(() => {
        showScreen('screen-role');
    }, 2000);

    let currentRole = '';

    function startApp(role) {
        currentRole = role;
        showScreen('screen-app');
        buildNavigation();
        
        if(role === 'driver') {
            switchTab('driver-jobs', 'Aktuální jízdy v okolí', 0);
            loadJobs();
        } else {
            switchTab('company-add', 'Nový inzerát', 0);
        }
    }

    function buildNavigation() {
        const nav = document.getElementById('bottom-navigation');
        if (currentRole === 'driver') {
            nav.innerHTML = `
                <div class="nav-item active" onclick="switchTab('driver-jobs', 'Aktuální jízdy v okolí', 0)">🛣️ Inzeráty</div>
                <div class="nav-item" onclick="switchTab('driver-profile', 'Můj Profil', 1)">👤 Můj Profil</div>
            `;
        } else {
            nav.innerHTML = `
                <div class="nav-item active" onclick="switchTab('company-add', 'Nový inzerát', 0)">📝 Zadat Inzerát</div>
                <div class="nav-item" onclick="switchTab('company-profile', 'Firemní profil', 1)">🏢 Firma</div>
            `;
        }
    }

    function switchTab(tabId, headerText, index) {
        document.getElementById('app-header').innerText = headerText;
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');

        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(n => n.classList.remove('active'));
        if(navItems[index]) navItems[index].classList.add('active');
    }

    function loadJobs() {
        const container = document.getElementById('jobs-list');
        container.innerHTML = '<div style="text-align:center; padding: 20px;">Načítám vhodné nabídky...</div>';
        
        setTimeout(() => {
            const jobsData = [
                { 
                    company: 'Dřevo Trans', 
                    type: 'Záskok 3 dny', 
                    from: 'Šumperk (Lesy)', to: 'Pila Paskov', 
                    req: ['Lesovůz', 'C+E', 'Vazačák'], 
                    sleep: 'Každý den doma', smoke: 'Kuřák nevadí',
                    img: 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=600&auto=format&fit=crop',
                    pay: 'Hotově', price: '4 500 Kč / den' 
                },
                { 
                    company: 'Mrazírny Express', 
                    type: 'Turnus', 
                    from: 'Praha', to: 'Valencie (ESP)', 
                    req: ['Frigo', 'C+E'], 
                    sleep: 'Celý týden v autě', smoke: 'Nekuřácké auto!',
                    img: 'https://images.unsplash.com/photo-1519003722824-194d4455a60c?q=80&w=600&auto=format&fit=crop',
                    pay: 'Faktura 14 dní', price: '3 200 Kč / den' 
                }
            ];

            container.innerHTML = '';
            jobsData.forEach(job => {
                let tagsHTML = job.req.map(t => `<span class="tag">${t}</span>`).join('');
                tagsHTML += `<span class="tag alert">🛌 ${job.sleep}</span>`;
                tagsHTML += `<span class="tag alert">🚬 ${job.smoke}</span>`;

                container.innerHTML += `
                    <div class="card">
                        <img src="${job.img}" class="card-img" alt="Kamion">
                        <div class="card-header">
                            <span class="card-title">${job.company}</span>
                            <span class="card-badge">${job.type}</span>
                        </div>
                        <div class="route-box">
                            <div style="flex: 1;">
                                <div style="color: var(--primary); font-size: 12px;">ODKUD:</div>
                                <div>${job.from}</div>
                            </div>
                            <div style="font-size: 20px;">➡️</div>
                            <div style="flex: 1; text-align: right;">
                                <div style="color: var(--danger); font-size: 12px;">KAM:</div>
                                <div>${job.to}</div>
                            </div>
                        </div>
                        <div class="tag-grid">${tagsHTML}</div>
                        <div style="color: var(--text-muted); font-size: 14px; margin-top: 10px;">💳 Způsob úhrady: ${job.pay}</div>
                        <div class="card-price">${job.price}</div>
                        <button class="btn btn-outline" style="margin-top: 15px; padding: 10px;" onclick="alert('Volám dispečera...')">☎️ Mám zájem</button>
                    </div>
                `;
            });
        }, 600);
    }
</script>

</body>
</html>
